<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="16" fill="#f0f4f8"/>
  <!-- Motor body -->
  <rect x="80" y="120" width="200" height="140" rx="10" fill="#4b5563" stroke="#374151" stroke-width="3"/>
  <!-- Cooling fins -->
  <g stroke="#374151" stroke-width="2">
    <line x1="90" y1="125" x2="90" y2="255"/>
    <line x1="110" y1="125" x2="110" y2="255"/>
    <line x1="130" y1="125" x2="130" y2="255"/>
    <line x1="150" y1="125" x2="150" y2="255"/>
    <line x1="170" y1="125" x2="170" y2="255"/>
    <line x1="190" y1="125" x2="190" y2="255"/>
    <line x1="210" y1="125" x2="210" y2="255"/>
    <line x1="230" y1="125" x2="230" y2="255"/>
    <line x1="250" y1="125" x2="250" y2="255"/>
    <line x1="270" y1="125" x2="270" y2="255"/>
  </g>
  <!-- End bell -->
  <rect x="280" y="130" width="30" height="120" rx="6" fill="#6b7280" stroke="#374151" stroke-width="3"/>
  <!-- Shaft -->
  <rect x="310" y="178" width="60" height="24" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <!-- Fan cover -->
  <rect x="55" y="140" width="30" height="100" rx="14" fill="#6b7280" stroke="#374151" stroke-width="3"/>
  <!-- Nameplate -->
  <rect x="140" y="168" width="80" height="44" rx="4" fill="#d1d5db" stroke="#374151" stroke-width="2"/>
  <text x="180" y="186" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">AC</text>
  <text x="180" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#374151">MOTOR</text>
  <!-- Mounting feet -->
  <rect x="100" y="260" width="40" height="16" rx="3" fill="#374151"/>
  <rect x="220" y="260" width="40" height="16" rx="3" fill="#374151"/>
  <!-- Bolt holes -->
  <circle cx="110" cy="272" r="4" fill="#f0f4f8"/>
  <circle cx="130" cy="272" r="4" fill="#f0f4f8"/>
  <circle cx="230" cy="272" r="4" fill="#f0f4f8"/>
  <circle cx="250" cy="272" r="4" fill="#f0f4f8"/>
  <text x="200" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#374151">AC Motor</text>
</svg>
