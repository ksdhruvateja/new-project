<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="16" fill="#f0f4f8"/>
  <!-- Sprocket body -->
  <circle cx="200" cy="185" r="80" fill="#6b7280" stroke="#374151" stroke-width="3"/>
  <!-- Center hole -->
  <circle cx="200" cy="185" r="22" fill="#f0f4f8" stroke="#374151" stroke-width="3"/>
  <!-- Keyway -->
  <rect x="195" y="163" width="10" height="22" fill="#374151"/>
  <!-- Teeth -->
  <g fill="#4b5563" stroke="#374151" stroke-width="2">
    <polygon points="200,100 190,115 210,115"/>
    <polygon points="200,270 190,255 210,255"/>
    <polygon points="115,185 130,175 130,195"/>
    <polygon points="285,185 270,175 270,195"/>
    <polygon points="140,125 155,118 148,138"/>
    <polygon points="260,125 245,118 252,138"/>
    <polygon points="140,245 155,252 148,232"/>
    <polygon points="260,245 245,252 252,232"/>
    <polygon points="165,108 172,125 158,120"/>
    <polygon points="235,108 228,125 242,120"/>
    <polygon points="165,262 172,245 158,250"/>
    <polygon points="235,262 228,245 242,250"/>
    <polygon points="120,150 137,148 132,162"/>
    <polygon points="280,150 263,148 268,162"/>
    <polygon points="120,220 137,222 132,208"/>
    <polygon points="280,220 263,222 268,208"/>
  </g>
  <!-- Bolt holes -->
  <circle cx="200" cy="145" r="6" fill="#f0f4f8" stroke="#374151" stroke-width="2"/>
  <circle cx="200" cy="225" r="6" fill="#f0f4f8" stroke="#374151" stroke-width="2"/>
  <circle cx="160" cy="185" r="6" fill="#f0f4f8" stroke="#374151" stroke-width="2"/>
  <circle cx="240" cy="185" r="6" fill="#f0f4f8" stroke="#374151" stroke-width="2"/>
  <text x="200" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#374151">Sprocket</text>
</svg>
