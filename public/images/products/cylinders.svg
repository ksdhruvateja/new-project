<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="16" fill="#f0f4f8"/>
  <!-- Cylinder body -->
  <rect x="100" y="100" width="200" height="80" rx="8" fill="#6b7280" stroke="#374151" stroke-width="3"/>
  <!-- Piston rod -->
  <rect x="300" y="128" width="70" height="24" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <!-- Rod end -->
  <circle cx="370" cy="140" r="12" fill="#4b5563" stroke="#374151" stroke-width="2"/>
  <circle cx="370" cy="140" r="5" fill="#f0f4f8"/>
  <!-- End cap left -->
  <rect x="80" y="108" width="24" height="64" rx="4" fill="#4b5563" stroke="#374151" stroke-width="2"/>
  <!-- End cap right -->
  <rect x="296" y="108" width="10" height="64" rx="2" fill="#4b5563" stroke="#374151" stroke-width="2"/>
  <!-- Port fittings -->
  <rect x="140" y="84" width="16" height="20" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <rect x="240" y="84" width="16" height="20" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <!-- Mounting bracket -->
  <rect x="85" y="176" width="14" height="40" rx="3" fill="#4b5563" stroke="#374151" stroke-width="2"/>
  <circle cx="92" cy="204" r="5" fill="#f0f4f8" stroke="#374151" stroke-width="1.5"/>
  <!-- Tie rods -->
  <line x1="110" y1="106" x2="110" y2="174" stroke="#374151" stroke-width="3"/>
  <line x1="290" y1="106" x2="290" y2="174" stroke="#374151" stroke-width="3"/>
  <text x="200" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#374151">Pneumatic Cylinder</text>
</svg>
