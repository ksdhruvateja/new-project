<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#f8fafc"/>
  <!-- Top washer -->
  <ellipse cx="400" cy="300" rx="220" ry="60" fill="#d1d5db" stroke="#374151" stroke-width="10"/>
  <!-- Bottom washer -->
  <ellipse cx="400" cy="440" rx="220" ry="60" fill="#9ca3af" stroke="#374151" stroke-width="10"/>
  <!-- Side walls -->
  <line x1="180" y1="300" x2="180" y2="440" stroke="#374151" stroke-width="10"/>
  <line x1="620" y1="300" x2="620" y2="440" stroke="#374151" stroke-width="10"/>
  <!-- Rolling elements between -->
  <ellipse cx="260" cy="370" rx="22" ry="16" fill="#e5e7eb" stroke="#1f2937" stroke-width="4"/>
  <ellipse cx="340" cy="370" rx="22" ry="16" fill="#e5e7eb" stroke="#1f2937" stroke-width="4"/>
  <ellipse cx="420" cy="370" rx="22" ry="16" fill="#e5e7eb" stroke="#1f2937" stroke-width="4"/>
  <ellipse cx="500" cy="370" rx="22" ry="16" fill="#e5e7eb" stroke="#1f2937" stroke-width="4"/>
  <!-- Axial arrow -->
  <line x1="400" y1="160" x2="400" y2="540" stroke="#ef4444" stroke-width="6" stroke-dasharray="12 8"/>
  <polygon points="390,160 410,160 400,130" fill="#ef4444"/>
  <polygon points="390,540 410,540 400,570" fill="#ef4444"/>
  <text x="400" y="740" text-anchor="middle" font-family="Arial,sans-serif" font-size="44" font-weight="700" fill="#0f172a">THRUST BEARINGS</text>
</svg>
