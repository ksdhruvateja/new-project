<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="16" fill="#f0f4f8"/>
  <!-- Left hub -->
  <ellipse cx="140" cy="190" rx="50" ry="70" fill="#6b7280" stroke="#374151" stroke-width="3"/>
  <!-- Right hub -->
  <ellipse cx="260" cy="190" rx="50" ry="70" fill="#6b7280" stroke="#374151" stroke-width="3"/>
  <!-- Spider/insert (center) -->
  <ellipse cx="200" cy="190" rx="38" ry="55" fill="#f59e0b" stroke="#374151" stroke-width="3"/>
  <!-- Left shaft -->
  <rect x="30" y="180" width="65" height="20" rx="4" fill="#4b5563" stroke="#374151" stroke-width="2"/>
  <!-- Right shaft -->
  <rect x="305" y="180" width="65" height="20" rx="4" fill="#4b5563" stroke="#374151" stroke-width="2"/>
  <!-- Center details -->
  <line x1="200" y1="138" x2="200" y2="242" stroke="#374151" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Jaw teeth left -->
  <rect x="155" y="158" width="20" height="16" rx="3" fill="#4b5563"/>
  <rect x="155" y="190" width="20" height="16" rx="3" fill="#4b5563"/>
  <rect x="155" y="220" width="20" height="16" rx="3" fill="#4b5563"/>
  <!-- Jaw teeth right -->
  <rect x="225" y="148" width="20" height="16" rx="3" fill="#4b5563"/>
  <rect x="225" y="178" width="20" height="16" rx="3" fill="#4b5563"/>
  <rect x="225" y="208" width="20" height="16" rx="3" fill="#4b5563"/>
  <text x="200" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#374151">Coupling</text>
</svg>
