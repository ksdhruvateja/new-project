<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="16" fill="#f0f4f8"/>
  <!-- Valve body -->
  <rect x="80" y="130" width="240" height="100" rx="10" fill="#4b5563" stroke="#374151" stroke-width="3"/>
  <!-- Spool housing -->
  <rect x="100" y="145" width="200" height="70" rx="6" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <!-- Port openings (bottom) -->
  <rect x="120" y="230" width="20" height="30" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <rect x="170" y="230" width="20" height="30" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <rect x="220" y="230" width="20" height="30" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <rect x="270" y="230" width="20" height="30" rx="4" fill="#9ca3af" stroke="#374151" stroke-width="2"/>
  <!-- Port labels -->
  <text x="130" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">P</text>
  <text x="180" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">A</text>
  <text x="230" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">B</text>
  <text x="280" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">R</text>
  <!-- Solenoid (left) -->
  <rect x="50" y="152" width="35" height="56" rx="6" fill="#f59e0b" stroke="#374151" stroke-width="2"/>
  <!-- Solenoid (right) -->
  <rect x="315" y="152" width="35" height="56" rx="6" fill="#f59e0b" stroke="#374151" stroke-width="2"/>
  <!-- Connector pins -->
  <rect x="58" y="138" width="8" height="18" rx="2" fill="#374151"/>
  <rect x="74" y="138" width="8" height="18" rx="2" fill="#374151"/>
  <rect x="323" y="138" width="8" height="18" rx="2" fill="#374151"/>
  <rect x="339" y="138" width="8" height="18" rx="2" fill="#374151"/>
  <!-- Manual override -->
  <circle cx="200" cy="135" r="8" fill="#d1d5db" stroke="#374151" stroke-width="2"/>
  <text x="200" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#374151">Pneumatic Valve</text>
</svg>
