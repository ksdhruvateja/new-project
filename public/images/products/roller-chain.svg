<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="16" fill="#f0f4f8"/>
  <!-- Chain links -->
  <g stroke="#374151" stroke-width="4" fill="none">
    <!-- Link 1 -->
    <rect x="50" y="160" width="60" height="80" rx="20" fill="#9ca3af"/>
    <rect x="50" y="160" width="60" height="80" rx="20"/>
    <!-- Link 2 -->
    <rect x="100" y="160" width="60" height="80" rx="20" fill="#6b7280"/>
    <rect x="100" y="160" width="60" height="80" rx="20"/>
    <!-- Link 3 -->
    <rect x="150" y="160" width="60" height="80" rx="20" fill="#9ca3af"/>
    <rect x="150" y="160" width="60" height="80" rx="20"/>
    <!-- Link 4 -->
    <rect x="200" y="160" width="60" height="80" rx="20" fill="#6b7280"/>
    <rect x="200" y="160" width="60" height="80" rx="20"/>
    <!-- Link 5 -->
    <rect x="250" y="160" width="60" height="80" rx="20" fill="#9ca3af"/>
    <rect x="250" y="160" width="60" height="80" rx="20"/>
    <!-- Link 6 -->
    <rect x="300" y="160" width="60" height="80" rx="20" fill="#6b7280"/>
    <rect x="300" y="160" width="60" height="80" rx="20"/>
  </g>
  <!-- Pins -->
  <g fill="#1f2937">
    <circle cx="80" cy="178" r="8"/><circle cx="80" cy="222" r="8"/>
    <circle cx="130" cy="178" r="8"/><circle cx="130" cy="222" r="8"/>
    <circle cx="180" cy="178" r="8"/><circle cx="180" cy="222" r="8"/>
    <circle cx="230" cy="178" r="8"/><circle cx="230" cy="222" r="8"/>
    <circle cx="280" cy="178" r="8"/><circle cx="280" cy="222" r="8"/>
    <circle cx="330" cy="178" r="8"/><circle cx="330" cy="222" r="8"/>
  </g>
  <text x="200" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#374151">Roller Chain</text>
</svg>
