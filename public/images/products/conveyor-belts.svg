<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#fef9c3"/>
  <!-- Conveyor frame -->
  <rect x="100" y="300" width="600" height="120" rx="8" fill="#fef08a" stroke="#713f12" stroke-width="8"/>
  <!-- Rollers -->
  <circle cx="180" cy="360" r="40" fill="#facc15" stroke="#854d0e" stroke-width="6"/>
  <circle cx="400" cy="360" r="40" fill="#facc15" stroke="#854d0e" stroke-width="6"/>
  <circle cx="620" cy="360" r="40" fill="#facc15" stroke="#854d0e" stroke-width="6"/>
  <!-- Wide belt -->
  <rect x="100" y="280" width="600" height="30" rx="4" fill="#eab308" stroke="#78350f" stroke-width="4"/>
  <rect x="100" y="410" width="600" height="30" rx="4" fill="#ca8a04" stroke="#78350f" stroke-width="4"/>
  <!-- Material on belt -->
  <path d="M140 260 Q280 210 400 250 Q520 290 660 260" fill="#a16207" opacity="0.4"/>
  <text x="400" y="740" text-anchor="middle" font-family="Arial,sans-serif" font-size="44" font-weight="700" fill="#713f12">CONVEYOR BELTS</text>
</svg>
