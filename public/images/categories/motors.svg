<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#eff6ff"/>
  <!-- Motor body -->
  <rect x="180" y="220" width="360" height="320" rx="28" fill="#bfdbfe" stroke="#1e3a8a" stroke-width="14"/>
  <!-- Cooling fins -->
  <line x1="180" y1="270" x2="540" y2="270" stroke="#3b82f6" stroke-width="6"/>
  <line x1="180" y1="310" x2="540" y2="310" stroke="#3b82f6" stroke-width="6"/>
  <line x1="180" y1="350" x2="540" y2="350" stroke="#3b82f6" stroke-width="6"/>
  <line x1="180" y1="390" x2="540" y2="390" stroke="#3b82f6" stroke-width="6"/>
  <line x1="180" y1="430" x2="540" y2="430" stroke="#3b82f6" stroke-width="6"/>
  <line x1="180" y1="470" x2="540" y2="470" stroke="#3b82f6" stroke-width="6"/>
  <!-- Shaft -->
  <rect x="540" y="350" width="160" height="60" rx="8" fill="#93c5fd" stroke="#1e3a8a" stroke-width="8"/>
  <!-- Fan cover -->
  <rect x="100" y="280" width="80" height="200" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="8"/>
  <!-- Fan blades -->
  <line x1="140" y1="300" x2="140" y2="340" stroke="#1e40af" stroke-width="6"/>
  <line x1="120" y1="320" x2="160" y2="320" stroke="#1e40af" stroke-width="6"/>
  <line x1="140" y1="420" x2="140" y2="460" stroke="#1e40af" stroke-width="6"/>
  <line x1="120" y1="440" x2="160" y2="440" stroke="#1e40af" stroke-width="6"/>
  <!-- Mounting feet -->
  <rect x="220" y="540" width="80" height="40" rx="6" fill="#1e3a8a"/>
  <rect x="420" y="540" width="80" height="40" rx="6" fill="#1e3a8a"/>
  <!-- Nameplate -->
  <rect x="280" y="400" width="180" height="60" rx="8" fill="#fbbf24" stroke="#92400e" stroke-width="4"/>
  <text x="370" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#451a03">AC MOTOR</text>
  <text x="400" y="740" text-anchor="middle" font-family="Arial,sans-serif" font-size="48" font-weight="800" fill="#1e3a8a">MOTORS</text>
</svg>
