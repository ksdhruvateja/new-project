<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#ecfeff"/>
  <!-- Conveyor frame -->
  <rect x="100" y="300" width="600" height="180" rx="12" fill="#cffafe" stroke="#155e75" stroke-width="10"/>
  <!-- Rollers -->
  <circle cx="180" cy="390" r="50" fill="#a5f3fc" stroke="#0e7490" stroke-width="8"/>
  <circle cx="180" cy="390" r="16" fill="#155e75"/>
  <circle cx="400" cy="390" r="50" fill="#a5f3fc" stroke="#0e7490" stroke-width="8"/>
  <circle cx="400" cy="390" r="16" fill="#155e75"/>
  <circle cx="620" cy="390" r="50" fill="#a5f3fc" stroke="#0e7490" stroke-width="8"/>
  <circle cx="620" cy="390" r="16" fill="#155e75"/>
  <!-- Belt top -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#0891b2" stroke-width="14"/>
  <!-- Belt bottom -->
  <line x1="100" y1="480" x2="700" y2="480" stroke="#0891b2" stroke-width="14"/>
  <!-- Items on belt -->
  <rect x="230" y="240" width="60" height="60" rx="6" fill="#f97316" stroke="#111" stroke-width="4"/>
  <rect x="440" y="240" width="60" height="60" rx="6" fill="#f97316" stroke="#111" stroke-width="4"/>
  <!-- Legs -->
  <line x1="160" y1="480" x2="160" y2="600" stroke="#334155" stroke-width="12"/>
  <line x1="640" y1="480" x2="640" y2="600" stroke="#334155" stroke-width="12"/>
  <text x="400" y="740" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" font-weight="800" fill="#155e75">CONVEYOR COMPONENTS</text>
</svg>
