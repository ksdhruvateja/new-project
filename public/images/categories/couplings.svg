<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#f5f3ff"/>
  <!-- Left shaft -->
  <rect x="80" y="330" width="240" height="80" rx="10" fill="#c4b5fd" stroke="#4c1d95" stroke-width="10"/>
  <!-- Right shaft -->
  <rect x="480" y="330" width="240" height="80" rx="10" fill="#c4b5fd" stroke="#4c1d95" stroke-width="10"/>
  <!-- Coupling body -->
  <rect x="280" y="290" width="240" height="160" rx="20" fill="#7c3aed" stroke="#3b0764" stroke-width="12"/>
  <!-- Jaw teeth / spider element -->
  <rect x="310" y="320" width="30" height="100" rx="6" fill="#fbbf24"/>
  <rect x="370" y="320" width="30" height="100" rx="6" fill="#e5e7eb"/>
  <rect x="430" y="320" width="30" height="100" rx="6" fill="#fbbf24"/>
  <!-- Bolt holes -->
  <circle cx="300" cy="370" r="12" fill="#1e1b4b"/>
  <circle cx="500" cy="370" r="12" fill="#1e1b4b"/>
  <text x="400" y="740" text-anchor="middle" font-family="Arial,sans-serif" font-size="48" font-weight="800" fill="#3b0764">COUPLINGS</text>
</svg>
