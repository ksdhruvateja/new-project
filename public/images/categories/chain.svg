<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#f0fdf4"/>
  <!-- Sprocket 1 -->
  <circle cx="280" cy="360" r="120" fill="#d1d5db" stroke="#166534" stroke-width="14"/>
  <g fill="#166534">
    <rect x="270" y="220" width="20" height="40" rx="4"/>
    <rect x="270" y="480" width="20" height="40" rx="4"/>
    <rect x="380" y="350" width="40" height="20" rx="4"/>
    <rect x="140" y="350" width="40" height="20" rx="4"/>
    <rect x="345" y="260" width="20" height="36" rx="4" transform="rotate(45 355 278)"/>
    <rect x="195" y="440" width="20" height="36" rx="4" transform="rotate(45 205 458)"/>
    <rect x="345" y="440" width="20" height="36" rx="4" transform="rotate(-45 355 458)"/>
    <rect x="195" y="260" width="20" height="36" rx="4" transform="rotate(-45 205 278)"/>
  </g>
  <circle cx="280" cy="360" r="40" fill="#14532d"/>
  <!-- Sprocket 2 -->
  <circle cx="560" cy="360" r="80" fill="#d1d5db" stroke="#166534" stroke-width="10"/>
  <g fill="#166534">
    <rect x="550" y="265" width="20" height="30" rx="4"/>
    <rect x="550" y="425" width="20" height="30" rx="4"/>
    <rect x="625" y="350" width="30" height="20" rx="4"/>
    <rect x="465" y="350" width="30" height="20" rx="4"/>
  </g>
  <circle cx="560" cy="360" r="28" fill="#14532d"/>
  <!-- Chain links -->
  <line x1="280" y1="240" x2="560" y2="280" stroke="#374151" stroke-width="16" stroke-dasharray="28 14"/>
  <line x1="280" y1="480" x2="560" y2="440" stroke="#374151" stroke-width="16" stroke-dasharray="28 14"/>
  <text x="400" y="740" text-anchor="middle" font-family="Arial,sans-serif" font-size="44" font-weight="800" fill="#14532d">CHAIN &amp; SPROCKETS</text>
</svg>
