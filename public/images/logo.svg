<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gear-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="swirl-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="60%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Gear body -->
  <circle cx="100" cy="100" r="72" fill="url(#gear-grad)"/>
  <!-- Gear teeth -->
  <g fill="url(#gear-grad)">
    <rect x="88" y="14" width="24" height="28" rx="4"/>
    <rect x="88" y="158" width="24" height="28" rx="4"/>
    <rect x="14" y="88" width="28" height="24" rx="4"/>
    <rect x="158" y="88" width="28" height="24" rx="4"/>
    <rect x="35" y="35" width="24" height="28" rx="4" transform="rotate(45 47 49)"/>
    <rect x="141" y="35" width="24" height="28" rx="4" transform="rotate(-45 153 49)"/>
    <rect x="35" y="137" width="24" height="28" rx="4" transform="rotate(-45 47 151)"/>
    <rect x="141" y="137" width="24" height="28" rx="4" transform="rotate(45 153 151)"/>
  </g>
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="52" fill="#1565c0"/>
  <!-- Swirl motif -->
  <path d="M100 55 C130 55, 145 80, 135 105 C125 130, 100 135, 80 120 C60 105, 62 82, 80 72 C98 62, 112 72, 108 88 C104 104, 88 106, 84 96" 
        fill="none" stroke="url(#swirl-grad)" stroke-width="14" stroke-linecap="round"/>
</svg>
