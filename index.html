          "@type": "Question",
          "name": "How do I request a bulk quote from Forez?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Navigate to the Sourcing page, add products from the catalog or enter custom items manually, then fill in your contact details and submit. Our procurement team typically responds within 24–48 business hours."
          }
        },
        {
          "@type": "Question",
          "name": "Does Forez source products not listed in the catalog?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Our custom sourcing process supports hard-to-find items and equivalent options based on your specifications and application needs. We work with a wide network of OEM and aftermarket suppliers."
          }
        },
        {
          "@type": "Question",
          "name": "Is Forez a certified Minority Business Enterprise?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Forez is a NYC Certified Minority Business Enterprise (MBE). We provide full compliance documentation to support public-sector procurement programs including NYS OGS, NYC Agency purchasing, and other institutional programs."
          }
        },
        {
          "@type": "Question",
          "name": "How can I track my order from Forez?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Every order is assigned a unique Order Number and a carrier Tracking Number sent via email once your order ships. Use the tracking number on the carrier portal (UPS, FedEx, or freight provider) to monitor real-time shipment status."
          }
        },
        {
          "@type": "Question",
          "name": "What brands does Forez distribute?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We distribute products from SKF, Timken, NSK, NTN, Dodge, Browning, Baldor, Gates, Rexnord, Lovejoy, Martin, Falk, TB Woods, Link-Belt, Morse, Bando, Renold, Diamond, and more."

        }
      ]
    }
